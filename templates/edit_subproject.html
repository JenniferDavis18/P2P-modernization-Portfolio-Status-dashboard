<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Sub-Project - {{ sub_project.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8 offset-md-2">
                <h1 class="mb-4">Edit Sub-Project</h1>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
                        <li class="breadcrumb-item"><a href="{{ url_for('edit_project', project_id=project.id) }}">{{
                                project.name }}</a></li>
                        <li class="breadcrumb-item active">Edit Sub-Project</li>
                    </ol>
                </nav>

                <div class="card">
                    <div class="card-body">
                        <form method="POST">
                            <div class="mb-3">
                                <label for="name" class="form-label">Sub-Project Name</label>
                                <input type="text" class="form-control" id="name" name="name"
                                    value="{{ sub_project.name }}" required>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" name="description"
                                    rows="3">{{ sub_project.description }}</textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-4">
                                    <div class="mb-3">
                                        <label for="start_date" class="form-label">Start Date</label>
                                        <input type="date" class="form-control" id="start_date" name="start_date"
                                            value="{{ sub_project.start_date }}">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="mb-3">
                                        <label for="end_date" class="form-label">End Date</label>
                                        <input type="date" class="form-control" id="end_date" name="end_date"
                                            value="{{ sub_project.end_date }}">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="mb-3">
                                        <label for="deployment_date" class="form-label">Deployment Date</label>
                                        <input type="date" class="form-control" id="deployment_date"
                                            name="deployment_date" value="{{ sub_project.deployment_date }}">
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="status" class="form-label">Status</label>
                                <select class="form-control" id="status" name="status">
                                    <option value="active" {% if sub_project.status=='active' %}selected{% endif %}>
                                        Active</option>
                                    <option value="on-hold" {% if sub_project.status=='on-hold' %}selected{% endif %}>On
                                        Hold</option>
                                    <option value="completed" {% if sub_project.status=='completed' %}selected{% endif
                                        %}>Completed</option>
                                    <option value="cancelled" {% if sub_project.status=='cancelled' %}selected{% endif
                                        %}>Cancelled</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="health" class="form-label">Health</label>
                                <select class="form-control" id="health" name="health">
                                    <option value="green" {% if sub_project.health=='green' %}selected{% endif %}>Green
                                        - On Track</option>
                                    <option value="yellow" {% if sub_project.health=='yellow' %}selected{% endif %}>
                                        Yellow - At Risk</option>
                                    <option value="red" {% if sub_project.health=='red' %}selected{% endif %}>Red -
                                        Critical Issues</option>
                                </select>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
